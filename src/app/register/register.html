<div class="register-wrapper">
  <div class="register-box shadow-box">
    <div class="register-header">
      <h2>Créer un compte Client</h2>
      <p>Inscrivez-vous pour louer et réserver vos espaces de bureau</p>
    </div>

    <form (submit)="onInscription(); $event.preventDefault()" class="register-form" enctype="multipart/form-data">
      
      <!-- Section 1 : État Civil de base -->
      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Prénom <span class="required">*</span></label>
          <input type="text" [(ngModel)]="formInscription().first_name" name="first_name" required class="custom-input" placeholder="Ex: John">
        </div>

        <div class="input-group">
          <label class="input-label">Nom <span class="required">*</span></label>
          <input type="text" [(ngModel)]="formInscription().last_name" name="last_name" required class="custom-input" placeholder="Ex: Doe">
        </div>
      </div>

      <!-- Section 2 : Identifiants de connexion -->
      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Nom d'utilisateur <span class="required">*</span></label>
          <input type="text" [(ngModel)]="formInscription().username" name="username" required class="custom-input" placeholder="Ex: jdoe99">
        </div>

        <div class="input-group">
          <label class="input-label">Adresse Email <span class="required">*</span></label>
          <input type="email" [(ngModel)]="formInscription().email" name="email" required class="custom-input" placeholder="Ex: john.doe@example.com">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Mot de passe <span class="required">*</span></label>
        <input type="password" [(ngModel)]="formInscription().password" name="password" required class="custom-input" placeholder="••••••••">
      </div>

      <!-- Section 3 : Contacts et Naissance -->
      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Téléphone (Cameroun)</label>
          <input type="tel" [(ngModel)]="formInscription().telephone" name="telephone" class="custom-input" placeholder="Ex: 699999999">
        </div>

        <div class="input-group">
          <label class="input-label">Date de naissance</label>
          <input type="date" [(ngModel)]="formInscription().date_naissance" name="date_naissance" class="custom-input">
        </div>
      </div>

      <!-- Section 4 : Origines et Activités -->
      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Lieu de naissance</label>
          <input type="text" [(ngModel)]="formInscription().lieu_naissance" name="lieu_naissance" class="custom-input" placeholder="Ex: Yaoundé">
        </div>

        <div class="input-group">
          <label class="input-label">Nationalité</label>
          <input type="text" [(ngModel)]="formInscription().nationalite" name="nationalite" class="custom-input" placeholder="Ex: Camerounaise">
        </div>
      </div>

      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Profession</label>
          <input type="text" [(ngModel)]="formInscription().profession" name="profession" class="custom-input" placeholder="Ex: Développeur">
        </div>

        <div class="input-group">
          <label class="input-label">Adresse de résidence</label>
          <input type="text" [(ngModel)]="formInscription().addresse" name="addresse" class="custom-input" placeholder="Ex: Rue de l'Indépendance, Douala">
        </div>
      </div>

      <!-- Section 5 : Pièce d'identité -->
      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Type de pièce d'identité</label>
          <select [(ngModel)]="formInscription().type_piece_identite" name="type_piece_identite" class="custom-input">
            <option value="">-- Sélectionner un type --</option>
            <option value="CNI">Carte Nationale d'Identité</option>
            <option value="PASSPORT">Passeport</option>
            <option value="PERMIS">Permis de conduire</option>
            <option value="ACTE_NAISSANCE">Acte de naissance</option>
            <option value="AUTRE">Autre</option>
          </select>
        </div>

        <div class="input-group">
          <label class="input-label">Numéro de la pièce</label>
          <input type="text" [(ngModel)]="formInscription().numero_piece_identite" name="numero_piece_identite" class="custom-input" placeholder="Ex: 102345678">
        </div>
      </div>

      <!-- 🟢 AJOUT : Section Photo de profil -->
      <div class="input-group">
        <label class="input-label">Photo de profil</label>
        <input type="file" (change)="onFichierSelectionne($event)" accept="image/*" class="custom-input file-input">
      </div>

      <!-- Zone d'affichage des erreurs -->
      @if (errorMessage()) {
        <div class="alert-error-register">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="btn-register" [disabled]="chargementEnCours()">
        @if (chargementEnCours()) {
          <span>Création du compte en cours...</span>
        } @else {
          <span>S'inscrire maintenant</span>
        }
      </button>

      <div class="register-footer">
        <p>Vous avez déjà un compte ? <a routerLink="/login">Connectez-vous ici</a></p>
      </div>

    </form>
  </div>
</div>
