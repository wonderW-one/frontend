services:
  - type: web
    name: frontend
    runtime: static
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist/frontend/browser
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
    routes:
      # SPA : toute route inconnue renvoie vers index.html (Angular Router prend le relais côté client)
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY